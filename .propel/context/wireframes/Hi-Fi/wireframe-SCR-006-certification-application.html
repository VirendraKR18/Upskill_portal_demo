<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCR-006: Certification Application - AI Learning Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: {
            primary: { 50: '#E6F2FF', 500: '#0078D4', 600: '#0060A8' },
            secondary: { 500: '#10B981' },
            accent: { 500: '#8B5CF6' },
            neutral: { 50: '#F9FAFB', 100: '#F3F4F6', 200: '#E5E7EB', 300: '#D1D5DB', 500: '#6B7280', 600: '#4B5563', 700: '#374151', 900: '#111827' }
        }}}}
    </script>
    <style>body { font-family: 'Inter', system-ui, sans-serif; }</style>
</head>
<body class="bg-neutral-50">
    <!-- Navigation Map
    | Element | Action | Target Screen |
    |---------|--------|---------------|
    | #back-dashboard | click | SCR-002 (Dashboard) |
    | #submit-btn | click | SCR-024 (Certification Status) |
    -->
    <header class="bg-white border-b border-neutral-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <svg class="w-10 h-10 text-primary-500" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L2 7v10c0 5.5 3.8 10.7 10 12 6.2-1.3 10-6.5 10-12V7l-10-5z"/></svg>
                <span class="text-xl font-bold">AI Learning Platform</span>
            </div>
            <nav class="flex items-center gap-6">
                <a href="wireframe-SCR-002-dashboard.html" id="back-dashboard" class="text-neutral-600 hover:text-primary-500">Dashboard</a>
            </nav>
        </div>
    </header>

    <main class="max-w-3xl mx-auto px-6 py-8">
        <a href="wireframe-SCR-002-dashboard.html" class="text-sm text-primary-500 hover:text-primary-700 flex items-center gap-1 mb-4">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            Back to Dashboard
        </a>

        <h1 class="text-3xl font-bold text-neutral-900 mb-2">Apply for External Certification</h1>
        <p class="text-neutral-600 mb-8">Submit your certification application for manager approval</p>

        <!-- Progress Indicator -->
        <div class="flex items-center gap-4 mb-10">
            <div class="flex items-center gap-2"><div class="w-8 h-8 bg-primary-500 text-white rounded-full flex items-center justify-center font-semibold text-sm">1</div><span class="text-sm font-medium text-primary-600">Provider</span></div>
            <div class="flex-1 h-0.5 bg-neutral-200"></div>
            <div class="flex items-center gap-2"><div class="w-8 h-8 bg-neutral-200 text-neutral-500 rounded-full flex items-center justify-center font-semibold text-sm">2</div><span class="text-sm text-neutral-500">Details</span></div>
            <div class="flex-1 h-0.5 bg-neutral-200"></div>
            <div class="flex items-center gap-2"><div class="w-8 h-8 bg-neutral-200 text-neutral-500 rounded-full flex items-center justify-center font-semibold text-sm">3</div><span class="text-sm text-neutral-500">Justification</span></div>
        </div>

        <!-- Step 1: Provider Selection -->
        <div class="bg-white rounded-lg border border-neutral-200 p-8">
            <h2 class="text-xl font-bold text-neutral-900 mb-6">Step 1: Select Certification Provider</h2>
            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-neutral-700 mb-2">Provider <span class="text-red-500">*</span></label>
                    <select class="w-full px-4 py-2 border border-neutral-300 rounded-lg focus:ring-2 focus:ring-primary-500">
                        <option value="">Select a provider...</option>
                        <option>Coursera</option>
                        <option>Udacity</option>
                        <option>Pluralsight</option>
                        <option>AWS Training</option>
                        <option>Google Cloud Skills</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-neutral-700 mb-2">Course Name <span class="text-red-500">*</span></label>
                    <input type="text" placeholder="Search for a course..." class="w-full px-4 py-2 border border-neutral-300 rounded-lg focus:ring-2 focus:ring-primary-500" />
                </div>
                <div>
                    <label class="block text-sm font-medium text-neutral-700 mb-2">Estimated Cost <span class="text-red-500">*</span></label>
                    <div class="relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 text-neutral-500">$</span>
                        <input type="number" placeholder="299.99" class="w-full pl-8 pr-4 py-2 border border-neutral-300 rounded-lg focus:ring-2 focus:ring-primary-500" />
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-neutral-700 mb-2">Business Justification <span class="text-red-500">*</span></label>
                    <textarea rows="4" placeholder="Explain how this certification aligns with your role and team goals (min 50, max 500 characters)..." class="w-full px-4 py-2 border border-neutral-300 rounded-lg focus:ring-2 focus:ring-primary-500"></textarea>
                    <p class="text-xs text-neutral-500 mt-1">0/500 characters (min 50)</p>
                </div>
            </div>
            <div class="flex justify-end mt-8 pt-6 border-t border-neutral-200">
                <a href="wireframe-SCR-024-certification-status.html" id="submit-btn" class="px-8 py-3 bg-primary-500 text-white rounded-lg font-semibold hover:bg-primary-600 transition-colors">Submit Application</a>
            </div>
        </div>
    </main>
</body>
</html>
