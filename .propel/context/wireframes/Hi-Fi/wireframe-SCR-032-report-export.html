<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCR-032: Report Export - AI Learning Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={theme:{extend:{colors:{primary:{50:'#E6F2FF',500:'#0078D4',600:'#0060A8'},secondary:{500:'#10B981'},accent:{500:'#8B5CF6'},error:{500:'#EF4444'},warning:{500:'#F59E0B'},neutral:{50:'#F9FAFB',100:'#F3F4F6',200:'#E5E7EB',300:'#D1D5DB',500:'#6B7280',600:'#4B5563',700:'#374151',900:'#111827'}}}}}</script>
    <style>body{font-family:'Inter',system-ui,sans-serif;}</style>
</head>
<body class="bg-neutral-50">
    <!-- Navigation Map: #back-reports → SCR-016 -->
    <div class="flex h-screen">
        <aside class="w-64 bg-neutral-900 text-white flex-shrink-0">
            <div class="p-6 border-b border-neutral-800"><div class="flex items-center gap-3"><svg class="w-8 h-8 text-primary-500" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L2 7v10c0 5.5 3.8 10.7 10 12 6.2-1.3 10-6.5 10-12V7l-10-5z"/></svg><span class="font-bold">AI Learning</span></div></div>
            <nav class="p-4 space-y-1">
                <a href="wireframe-SCR-009-leadership-dashboard.html" class="flex items-center gap-3 px-4 py-3 text-neutral-300 hover:bg-neutral-800 rounded-lg">Dashboard</a>
                <a href="wireframe-SCR-016-executive-reports.html" id="back-reports" class="flex items-center gap-3 px-4 py-3 bg-primary-600 rounded-lg text-white font-medium">Reports</a>
            </nav>
        </aside>
        <div class="flex-1 overflow-y-auto">
            <header class="bg-white border-b border-neutral-200 px-8 py-4"><div class="flex items-center gap-3"><a href="wireframe-SCR-016-executive-reports.html" class="text-neutral-400 hover:text-neutral-600"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg></a><h1 class="text-2xl font-bold text-neutral-900">Export Report</h1></div></header>
            <main class="p-8 max-w-2xl">
                <div class="bg-white rounded-xl border border-neutral-200 p-8">
                    <div class="space-y-6">
                        <div>
                            <label class="block text-sm font-medium text-neutral-700 mb-2">Report Type</label>
                            <select class="w-full px-4 py-2.5 border border-neutral-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500"><option>Executive Summary</option><option>Department Detail</option><option>Individual Progress</option><option>ROI Analysis</option><option>Certification Overview</option></select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-neutral-700 mb-2">Date Range</label>
                            <div class="grid grid-cols-2 gap-4"><input type="date" class="px-4 py-2.5 border border-neutral-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500"><input type="date" class="px-4 py-2.5 border border-neutral-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500"></div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-neutral-700 mb-2">Department</label>
                            <select class="w-full px-4 py-2.5 border border-neutral-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500"><option>All Departments</option><option>Engineering</option><option>Product</option><option>Data Science</option><option>Marketing</option></select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-neutral-700 mb-2">Format</label>
                            <div class="flex gap-3">
                                <label class="flex items-center gap-2 px-4 py-3 border border-primary-500 bg-primary-50 rounded-lg cursor-pointer"><input type="radio" name="format" checked class="text-primary-500"><span class="text-sm font-medium text-primary-500">PDF</span></label>
                                <label class="flex items-center gap-2 px-4 py-3 border border-neutral-300 rounded-lg cursor-pointer hover:bg-neutral-50"><input type="radio" name="format" class="text-neutral-500"><span class="text-sm font-medium text-neutral-700">Excel</span></label>
                                <label class="flex items-center gap-2 px-4 py-3 border border-neutral-300 rounded-lg cursor-pointer hover:bg-neutral-50"><input type="radio" name="format" class="text-neutral-500"><span class="text-sm font-medium text-neutral-700">CSV</span></label>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-neutral-700 mb-2">Include</label>
                            <div class="space-y-2">
                                <label class="flex items-center gap-3"><input type="checkbox" checked class="rounded border-neutral-300 text-primary-500"><span class="text-sm text-neutral-700">Charts & Visualizations</span></label>
                                <label class="flex items-center gap-3"><input type="checkbox" checked class="rounded border-neutral-300 text-primary-500"><span class="text-sm text-neutral-700">Detailed Data Tables</span></label>
                                <label class="flex items-center gap-3"><input type="checkbox" class="rounded border-neutral-300 text-primary-500"><span class="text-sm text-neutral-700">Individual Learner Data</span></label>
                                <label class="flex items-center gap-3"><input type="checkbox" checked class="rounded border-neutral-300 text-primary-500"><span class="text-sm text-neutral-700">AI Recommendations</span></label>
                            </div>
                        </div>
                        <hr class="border-neutral-200">
                        <div class="flex gap-4">
                            <button class="px-6 py-3 bg-primary-500 text-white rounded-lg font-semibold hover:bg-primary-600 transition-colors">Generate & Download</button>
                            <button class="px-6 py-3 border border-neutral-300 text-neutral-700 rounded-lg hover:bg-neutral-50">Schedule Recurring</button>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
</body>
</html>
