<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCR-028: Create/Edit Course - AI Learning Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={theme:{extend:{colors:{primary:{50:'#E6F2FF',500:'#0078D4',600:'#0060A8'},secondary:{500:'#10B981'},neutral:{50:'#F9FAFB',100:'#F3F4F6',200:'#E5E7EB',300:'#D1D5DB',500:'#6B7280',600:'#4B5563',700:'#374151',900:'#111827'}}}}}</script>
    <style>body{font-family:'Inter',system-ui,sans-serif;}</style>
</head>
<body class="bg-neutral-50">
    <!-- Navigation Map: #back-content → SCR-013, #upload-step → SCR-029, #save-btn → SCR-013 -->
    <div class="flex h-screen">
        <aside class="w-64 bg-neutral-900 text-white flex-shrink-0">
            <div class="p-6 border-b border-neutral-800"><div class="flex items-center gap-3"><svg class="w-8 h-8 text-primary-500" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L2 7v10c0 5.5 3.8 10.7 10 12 6.2-1.3 10-6.5 10-12V7l-10-5z"/></svg><span class="font-bold">AI Learning</span></div></div>
            <nav class="p-4 space-y-1">
                <a href="wireframe-SCR-008-admin-console.html" class="flex items-center gap-3 px-4 py-3 text-neutral-300 hover:bg-neutral-800 rounded-lg">Admin Console</a>
                <a href="wireframe-SCR-013-content-management.html" id="back-content" class="flex items-center gap-3 px-4 py-3 bg-primary-600 rounded-lg text-white font-medium">Content Management</a>
            </nav>
        </aside>
        <div class="flex-1 overflow-y-auto">
            <header class="bg-white border-b border-neutral-200 px-8 py-4 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <a href="wireframe-SCR-013-content-management.html" class="text-neutral-400 hover:text-neutral-600"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg></a>
                    <h1 class="text-2xl font-bold text-neutral-900">Create Course</h1>
                </div>
                <div class="flex gap-3">
                    <button class="px-4 py-2 border border-neutral-300 rounded-lg text-sm">Save Draft</button>
                    <a href="wireframe-SCR-013-content-management.html" id="save-btn" class="px-4 py-2 bg-primary-500 text-white rounded-lg text-sm font-semibold hover:bg-primary-600">Publish</a>
                </div>
            </header>
            <main class="p-8 max-w-4xl">
                <!-- Progress Steps -->
                <div class="flex items-center gap-4 mb-8">
                    <div class="flex items-center gap-2"><div class="w-8 h-8 bg-primary-500 text-white rounded-full flex items-center justify-center font-semibold text-sm">1</div><span class="text-sm font-medium text-primary-600">Basic Info</span></div>
                    <div class="flex-1 h-0.5 bg-neutral-200"></div>
                    <div class="flex items-center gap-2"><div class="w-8 h-8 bg-neutral-200 text-neutral-500 rounded-full flex items-center justify-center font-semibold text-sm">2</div><span class="text-sm text-neutral-500">Credit Rules</span></div>
                    <div class="flex-1 h-0.5 bg-neutral-200"></div>
                    <div class="flex items-center gap-2"><div class="w-8 h-8 bg-neutral-200 text-neutral-500 rounded-full flex items-center justify-center font-semibold text-sm">3</div><span class="text-sm text-neutral-500">Prerequisites</span></div>
                    <div class="flex-1 h-0.5 bg-neutral-200"></div>
                    <div class="flex items-center gap-2"><div class="w-8 h-8 bg-neutral-200 text-neutral-500 rounded-full flex items-center justify-center font-semibold text-sm">4</div><span class="text-sm text-neutral-500">Materials</span></div>
                </div>

                <div class="bg-white rounded-lg border border-neutral-200 p-8">
                    <h2 class="text-lg font-bold text-neutral-900 mb-6">Step 1: Basic Information</h2>
                    <div class="space-y-6">
                        <div><label class="block text-sm font-medium text-neutral-700 mb-2">Course Title <span class="text-red-500">*</span></label><input type="text" placeholder="e.g. Introduction to Machine Learning" class="w-full px-4 py-2 border border-neutral-300 rounded-lg focus:ring-2 focus:ring-primary-500"/></div>
                        <div><label class="block text-sm font-medium text-neutral-700 mb-2">Description <span class="text-red-500">*</span></label><textarea rows="3" placeholder="Course description..." class="w-full px-4 py-2 border border-neutral-300 rounded-lg focus:ring-2 focus:ring-primary-500"></textarea></div>
                        <div class="grid grid-cols-3 gap-4">
                            <div><label class="block text-sm font-medium text-neutral-700 mb-2">Content Type</label><select class="w-full px-4 py-2 border border-neutral-300 rounded-lg"><option>Video</option><option>Text</option><option>Lab</option><option>Mixed</option></select></div>
                            <div><label class="block text-sm font-medium text-neutral-700 mb-2">Difficulty</label><select class="w-full px-4 py-2 border border-neutral-300 rounded-lg"><option>Beginner</option><option>Intermediate</option><option>Advanced</option></select></div>
                            <div><label class="block text-sm font-medium text-neutral-700 mb-2">Est. Duration</label><input type="text" placeholder="e.g. 2 weeks" class="w-full px-4 py-2 border border-neutral-300 rounded-lg focus:ring-2 focus:ring-primary-500"/></div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div><label class="block text-sm font-medium text-neutral-700 mb-2">Base Credits <span class="text-red-500">*</span></label><input type="number" placeholder="20" class="w-full px-4 py-2 border border-neutral-300 rounded-lg focus:ring-2 focus:ring-primary-500"/></div>
                            <div><label class="block text-sm font-medium text-neutral-700 mb-2">Bonus Threshold %</label><input type="number" placeholder="90" class="w-full px-4 py-2 border border-neutral-300 rounded-lg focus:ring-2 focus:ring-primary-500"/><p class="text-xs text-neutral-500 mt-1">Score above this % earns bonus credits</p></div>
                        </div>
                    </div>
                    <div class="flex justify-end mt-8 pt-6 border-t border-neutral-200">
                        <a href="wireframe-SCR-029-course-materials.html" id="upload-step" class="px-6 py-2 bg-primary-500 text-white rounded-lg font-semibold hover:bg-primary-600">Next: Upload Materials →</a>
                    </div>
                </div>
            </main>
        </div>
    </div>
</body>
</html>
