<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCR-004: User Profile - AI Learning Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { 50: '#E6F2FF', 500: '#0078D4', 600: '#0060A8', 700: '#00487C' },
                        secondary: { 500: '#10B981' },
                        accent: { 500: '#8B5CF6' },
                        neutral: { 50: '#F9FAFB', 100: '#F3F4F6', 200: '#E5E7EB', 300: '#D1D5DB', 500: '#6B7280', 600: '#4B5563', 700: '#374151', 900: '#111827' }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
    </style>
</head>
<body class="bg-neutral-50">
    <!-- Navigation Map
    | Element | Action | Target Screen |
    |---------|--------|---------------|
    | #dashboard-link | click | SCR-002 (Dashboard) |
    | #browse-courses | click | SCR-005 (Learning Path Browser) |
    | #notification-settings-tab | click | SCR-023 (Notification Settings) |
    -->
    <header class="bg-white border-b border-neutral-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <svg class="w-10 h-10 text-primary-500" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L2 7v10c0 5.5 3.8 10.7 10 12 6.2-1.3 10-6.5 10-12V7l-10-5z"/></svg>
                <span class="text-xl font-bold text-neutral-900">AI Learning Platform</span>
            </div>
            <nav class="flex items-center gap-6">
                <a href="wireframe-SCR-002-dashboard.html" id="dashboard-link" class="text-neutral-600 hover:text-primary-500">Dashboard</a>
                <a href="wireframe-SCR-005-learning-paths.html" class="text-neutral-600 hover:text-primary-500">Learning Paths</a>
                <a href="wireframe-SCR-003-leaderboard.html" class="text-neutral-600 hover:text-primary-500">Leaderboard</a>
            </nav>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-6 py-8">
        <!-- Profile Header -->
        <div class="bg-white rounded-lg border border-neutral-200 p-8 mb-8">
            <div class="flex items-center gap-6">
                <div class="w-24 h-24 bg-primary-500 rounded-full flex items-center justify-center text-white text-3xl font-bold">JD</div>
                <div>
                    <h1 class="text-3xl font-bold text-neutral-900">John Doe</h1>
                    <p class="text-neutral-600">Software Engineer · Engineering Team</p>
                    <div class="flex items-center gap-4 mt-2">
                        <span class="text-sm text-primary-600 bg-primary-50 px-3 py-1 rounded-full font-medium">245 Credits</span>
                        <span class="text-sm text-accent-500 bg-purple-50 px-3 py-1 rounded-full font-medium">Rank #47</span>
                        <span class="text-sm text-secondary-500 bg-green-50 px-3 py-1 rounded-full font-medium">12 Badges</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="border-b border-neutral-200 mb-8">
            <nav class="flex gap-8">
                <button class="py-3 border-b-2 border-primary-500 text-primary-600 font-semibold text-sm">Profile Info</button>
                <button class="py-3 border-b-2 border-transparent text-neutral-600 hover:text-neutral-900 text-sm">Badges</button>
                <button id="notification-settings-tab" class="py-3 border-b-2 border-transparent text-neutral-600 hover:text-neutral-900 text-sm">Notification Settings</button>
            </nav>
        </div>

        <!-- Profile Form -->
        <div class="bg-white rounded-lg border border-neutral-200 p-8">
            <form>
                <div class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-neutral-700 mb-2">Email</label>
                        <input type="email" value="john.doe@company.com" readonly class="w-full px-4 py-2 border border-neutral-200 rounded-lg bg-neutral-50 text-neutral-500 cursor-not-allowed" />
                        <p class="text-xs text-neutral-500 mt-1">Synced from Workday — cannot be changed</p>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-neutral-700 mb-2">Bio</label>
                        <textarea rows="4" class="w-full px-4 py-2 border border-neutral-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent" placeholder="Tell us about yourself...">Passionate about machine learning and data science. Currently exploring NLP and computer vision applications.</textarea>
                        <p class="text-xs text-neutral-500 mt-1">428/500 characters</p>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-neutral-700 mb-2">Skills</label>
                        <div class="flex flex-wrap gap-2 mb-2">
                            <span class="bg-primary-50 text-primary-700 px-3 py-1 rounded-full text-sm flex items-center gap-1">Python <button class="hover:text-primary-900">&times;</button></span>
                            <span class="bg-primary-50 text-primary-700 px-3 py-1 rounded-full text-sm flex items-center gap-1">Machine Learning <button class="hover:text-primary-900">&times;</button></span>
                            <span class="bg-primary-50 text-primary-700 px-3 py-1 rounded-full text-sm flex items-center gap-1">TensorFlow <button class="hover:text-primary-900">&times;</button></span>
                        </div>
                        <input type="text" placeholder="Add a skill..." class="w-full px-4 py-2 border border-neutral-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent" />
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-neutral-700 mb-2">Interests</label>
                        <div class="flex flex-wrap gap-2 mb-2">
                            <span class="bg-accent-50 text-accent-700 px-3 py-1 rounded-full text-sm flex items-center gap-1">NLP <button>&times;</button></span>
                            <span class="bg-accent-50 text-accent-700 px-3 py-1 rounded-full text-sm flex items-center gap-1">Computer Vision <button>&times;</button></span>
                        </div>
                        <input type="text" placeholder="Add an interest..." class="w-full px-4 py-2 border border-neutral-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent" />
                    </div>
                </div>
                <div class="flex justify-end gap-4 mt-8 pt-6 border-t border-neutral-200">
                    <button type="button" class="px-6 py-2 border border-neutral-300 rounded-lg text-neutral-700 hover:bg-neutral-50">Cancel</button>
                    <button type="submit" class="px-6 py-2 bg-primary-500 text-white rounded-lg font-semibold hover:bg-primary-600 transition-colors">Save Changes</button>
                </div>
            </form>
        </div>
    </main>
</body>
</html>
