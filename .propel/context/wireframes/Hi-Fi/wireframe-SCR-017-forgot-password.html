<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCR-017: Forgot Password - AI Learning Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={theme:{extend:{colors:{primary:{50:'#E6F2FF',500:'#0078D4',600:'#0060A8'},secondary:{500:'#10B981'},accent:{500:'#8B5CF6'},error:{500:'#EF4444'},warning:{500:'#F59E0B'},neutral:{50:'#F9FAFB',100:'#F3F4F6',200:'#E5E7EB',300:'#D1D5DB',500:'#6B7280',600:'#4B5563',700:'#374151',900:'#111827'}}}}}</script>
    <style>body{font-family:'Inter',system-ui,sans-serif;}</style>
</head>
<body class="bg-neutral-50 min-h-screen flex items-center justify-center">
    <!-- Navigation Map: #back-login → SCR-001 -->
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <svg class="w-12 h-12 text-primary-500 mx-auto mb-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L2 7v10c0 5.5 3.8 10.7 10 12 6.2-1.3 10-6.5 10-12V7l-10-5z"/></svg>
            <h1 class="text-2xl font-bold text-neutral-900">Reset Password</h1>
            <p class="text-neutral-500 mt-2 text-sm">Enter your email to receive reset instructions</p>
        </div>
        <div class="bg-white rounded-xl border border-neutral-200 p-8 shadow-sm">
            <div class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-neutral-700 mb-1.5">Email Address</label>
                    <input type="email" placeholder="you@company.com" class="w-full px-4 py-2.5 border border-neutral-300 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
                </div>
                <button class="w-full py-2.5 bg-primary-500 text-white rounded-lg font-semibold hover:bg-primary-600 transition-colors">Send Reset Link</button>
            </div>
            <div class="mt-6 text-center"><a href="wireframe-SCR-001-login.html" id="back-login" class="text-sm text-primary-500 hover:text-primary-700 font-medium">Back to Login</a></div>
        </div>

        <!-- Success State (Hidden by default) -->
        <div class="bg-white rounded-xl border border-neutral-200 p-8 shadow-sm mt-6 hidden">
            <div class="text-center">
                <div class="w-16 h-16 bg-green-50 rounded-full flex items-center justify-center mx-auto mb-4"><svg class="w-8 h-8 text-secondary-500" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg></div>
                <h2 class="text-lg font-semibold text-neutral-900 mb-2">Check Your Email</h2>
                <p class="text-sm text-neutral-500 mb-4">We've sent a password reset link to your email address. The link expires in 30 minutes.</p>
                <button class="text-primary-500 text-sm font-medium hover:text-primary-700">Resend Email</button>
            </div>
        </div>
    </div>
</body>
</html>
